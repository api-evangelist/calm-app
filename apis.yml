description: >-
  Calm is a leading consumer mindfulness, meditation, and sleep app available on iOS, Android,
  and web, with the consumer Calm app and the B2B Calm Health offering (formerly Calm Business,
  now consolidated at health.calm.com). Calm Health serves health plans, employers, and
  consultants with psychologist-developed clinical programs, validated mental health screenings
  (PHQ/GAD), personalized action plans, and the full Calm mindfulness library. Partner
  integration capabilities (eligibility files, SSO, SCIM, EHR/benefit-platform connectors)
  are sold through Calm Health enterprise contracts and are not documented in a public
  developer portal. There is no public REST API, no OpenAPI specification, and no self-serve
  developer onboarding.
